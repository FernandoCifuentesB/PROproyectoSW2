services:
  db:
    image: postgres:15
    container_name: gestor_eventos_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestor_eventos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestor_eventos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: gestor_eventos_api
    restart: always
    ports:
      - "3000:3000"
      - "5555:5555" 
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gestor_eventos?schema=public
    command: npm run start:dev

volumes:
  postgres_data: